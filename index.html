<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NIGHT CITY RACER</title>
<style>
    * { margin: 0; padding: 0; user-select: none; }
  body { background: #000; overflow: hidden; font-family: Arial Black; }
  canvas { display: block; width: 100vw; height: 100vh; }

  .hud { position: absolute; bottom: 30px; left: 30px; color: #0ff; font-size: 24px; text-shadow: 0 0 10px #0ff; }
  .speed { font-size: 60px; font-weight: bold; }
  .money { position: absolute; top: 30px; right: 30px; color: #ff0; font-size: 28px; text-shadow: 0 0 10px #ff0; }
  .heat { position: absolute; top: 70px; right: 30px; color: #f00; font-size: 22px; }
  .car-name { position: absolute; bottom: 30px; right: 30px; color: #fff; font-size: 22px; text-align: right; }

  .minimap { position: absolute; top: 30px; left: 30px; width: 200px; height: 200px; background: rgba(0,0,0,0.7); border: 3px solid #0ff; border-radius: 50%; }
  .player-dot { position: absolute; width: 8px; height: 8px; background: #0ff; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%,-50%); box-shadow: 0 0 10px #0ff; }

  .start { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #fff; text-align: center; background: rgba(0,0,0,0.9); padding: 40px; border: 4px solid #0ff; }
  .start h1 { font-size: 50px; color: #0ff; margin-bottom: 20px; text-shadow: 0 0 20px #0ff; }

  .mobile-btn { position: absolute; bottom: 100px; width: 80px; height: 80px; background: rgba(0,255,255,0.3); border: 3px solid #0ff; border-radius: 50%; font-size: 30px; color: #fff; display: none; }
  #btn-left { left: 50px; } #btn-right { right: 50px; } #btn-nitro { right: 150px; bottom: 200px; }
  @media (max-width: 800px) { .mobile-btn { display: block; } }

  .crack { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg"><path d="M0,0 L100,100 M50,0 L150,100" stroke="white" stroke-width="2" opacity="0.3"/></svg>'); pointer-events: none; opacity: 0; }
</style>
</head>
<body>
<div class="minimap"><div class="player-dot"></div></div>
<div class="hud"><div class="speed"><span id="speed">0</span> KM/H</div>NITRO: <span id="nitro">100</span>%</div>
<div class="money">$<span id="money">5000</span></div>
<div class="heat" id="heat"></div>
<div class="car-name"><span id="carname">SUPRA</span><br><span style="font-size:14px">1-5 Switch Car | U Upgrade | T Change City</span></div>
<div class="crack" id="crack"></div>

<button class="mobile-btn" id="btn-left">◀</button>
<button class="mobile-btn" id="btn-right">▶</button>
<button class="mobile-btn" id="btn-nitro">N2O</button>

<div class="start" id="start">
  <h1>NIGHT CITY RACER</h1>
  <p>WASD Drive | Shift Nitro | Space Drift | 1-5 Cars</p>
  <p>T = Teleport Cities | U = Upgrade Car | Find BLUE markers for races</p>
  <p style="color:#f00">Don't crash too hard or police will chase you!</p>
  <p>Click to Start</p>
</div>

<canvas id="c"></canvas>

<script type="importmap">
{"imports": {"three": "https://unpkg.com/three@0.160.0/build/three.module.js"}}
</script>

<script type="module">
import * as THREE from 'three';

// SCENE SETUP
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);

scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const sun = new THREE.DirectionalLight(0xffffff, 1);
sun.position.set(50, 100, 50);
scene.add(sun);

// CARS COLLECTION - 5 different cars
const cars = {
  supra: { color: 0xff3300, speed: 0.18, handling: 0.03, name: 'TOYOTA SUPRA' },
  gtr: { color: 0x111, speed: 0.20, handling: 0.025, name: 'NISSAN GTR' },
  mustang: { color: 0x0066ff, speed: 0.17, handling: 0.035, name: 'MUSTANG GT' },
  rx7: { color: 0xffff00, speed: 0.19, handling: 0.04, name: 'MAZDA RX-7' },
  lambo: { color: 0xffcc00, speed: 0.22, handling: 0.02, name: 'LAMBORGHINI' }
};
let currentCar = 'supra';
let carUpgrades = { speed: 0, handling: 0 };

// PLAYER CAR
const carGroup = new THREE.Group();
const body = new THREE.Mesh(new THREE.BoxGeometry(2, 0.8, 4), new THREE.MeshStandardMaterial({ color: cars[currentCar].color, metalness: 0.8 }));
body.position.y = 0.4;
carGroup.add(body);
const roof = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.6, 2), new THREE.MeshStandardMaterial({ color: 0x111 }));
roof.position.y = 0.7;
carGroup.add(roof);
scene.add(carGroup);

// 3 CITIES MAP
let city = 'downtown';
let buildings = [];
function generateCity(type) {
  buildings.forEach(b => scene.remove(b));
  buildings = [];
  const count = type === 'downtown'? 80 : type === 'industrial'? 40 : 60;
  for(let i=0; i<count; i++) {
    const h = type === 'downtown'? 20+Math.random()*60 : 8+Math.random()*15;
    const b = new THREE.Mesh(
      new THREE.BoxGeometry(8+Math.random()*10, h, 8+Math.random()*10),
      new THREE.MeshStandardMaterial({ 
        color: type==='downtown'?0x333:type==='industrial'?0x444:0x555,
        emissive: Math.random()>0.7?0x00ffff:0x000 
      })
    );
    b.position.set((Math.random()-0.5)*300, h/2, (Math.random()-0.5)*300);
    scene.add(b);
    buildings.push(b);
  }
}
generateCity('downtown');

// ROAD
const road = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x222 }));
road.rotation.x = -Math.PI/2;
scene.add(road);

// GAME STATE
let player = { pos: new THREE.Vector3(0, 0.5, 0), rot: 0, vel: 0, nitro: 100, money: 5000, heat: 0, damage: 0 };
let keys = {};
let started = false;

// CONTROLS
document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
document.addEventListener('click', () => { if(!started) { started = true; document.getElementById('start').style.display = 'none'; } });

// MOBILE BUTTONS
['btn-left','btn-right','btn-nitro'].forEach(id => {
  const btn = document.getElementById(id);
  btn.addEventListener('touchstart', () => keys[id==='btn-left'?'a':id==='btn-right'?'d':'shift'] = true);
  btn.addEventListener('touchend', () => keys[id==='btn-left'?'a':id==='btn-right'?'d':'shift'] = false);
});

// GAME LOOP
function animate() {
  requestAnimationFrame(animate);
  if(!started) { renderer.render(scene, camera); return; }

  const car = cars[currentCar];
  const speed = car.speed + carUpgrades.speed*0.02;
  const handling = car.handling + carUpgrades.handling*0.01;

  // CONTROLS
  if(keys['w']) player.vel = Math.min(player.vel + 0.01, speed);
  else player.vel *= 0.98;
  if(keys['s']) player.vel = Math.max(player.vel - 0.02, -speed*0.5);
  if(keys['a']) player.rot += handling * player.vel * 30;
  if(keys['d']) player.rot -= handling * player.vel * 30;

  // NITRO
  if(keys['shift'] && player.nitro > 0 && player.vel > 0.1) {
    player.vel *= 1.02;
    player.nitro -= 0.5;
  } else if(player.nitro < 100) player.nitro += 0.2;

  // DRIFT SMOKE
  if(keys[' '] && Math.abs(player.rot) > 0.02) {
    const smoke = new THREE.Mesh(new THREE.SphereGeometry(0.5, 8, 8), new THREE.MeshBasicMaterial({ color: 0x888, transparent: true, opacity: 0.4 }));
    smoke.position.set(carGroup.position.x, 0.2, carGroup.position.z);
    scene.add(smoke);
    setTimeout(() => scene.remove(smoke), 300);
  }

  // MOVE
  player.pos.x += Math.sin(player.rot) * player.vel;
  player.pos.z += Math.cos(player.rot) * player.vel;

  // CAR SWITCH 1-5
  if(keys['1']) currentCar = 'supra';
  if(keys['2']) currentCar = 'gtr';
  if(keys['3']) currentCar = 'mustang';
  if(keys['4']) currentCar = 'rx7';
  if(keys['5']) currentCar = 'lambo';
  body.material.color.setHex(cars[currentCar].color);
  document.getElementById('carname').textContent = cars[currentCar].name;

  // CHANGE CITY T
  if(keys['t']) {
    city = city === 'downtown'? 'industrial' : city === 'industrial'? 'harbor' : 'downtown';
    generateCity(city);
    keys['t'] = false;
  }

  // UPGRADE U
  if(keys['u'] && player.money >= 2000) {
    player.money -= 2000;
    carUpgrades.speed += 1;
    keys['u'] = false;
  }

  // POLICE HEAT
  if(player.vel > 0.15) player.heat = Math.min(player.heat + 0.1, 5);
  else player.heat = Math.max(player.heat - 0.05, 0);

  // CRASH DAMAGE
  if(player.vel > 0.18) {
    player.damage = Math.min(player.damage + 0.5, 100);
    document.getElementById('crack').style.opacity = player.damage/100;
  }

  // UPDATE CAR
  carGroup.position.copy(player.pos);
  carGroup.rotation.y = player.rot;

  // CAMERA CHASE
  camera.position.set(player.pos.x - Math.sin(player.rot)*15, 8, player.pos.z - Math.cos(player.rot)*15);
  camera.lookAt(player.pos);

  // HUD
  document.getElementById('speed').textContent = Math.floor(player.vel * 2000);
  document.getElementById('nitro').textContent = Math.floor(player.nitro);
  document.getElementById('money').textContent = player.money;
  document.getElementById('heat').textContent = '⭐'.repeat(Math.floor(player.heat));

  renderer.render(scene, camera);
}
animate();

// DAY/NIGHT CYCLE
setInterval(() => {
  sun.intensity = sun.intensity > 0.5? 0.2 : 1;
  scene.background = sun.intensity > 0.5? new THREE.Color(0x87CEEB) : new THREE.Color(0x000011);
}, 10000);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
