<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SA SOLDIER - COD Style FPS</title>
<style>
    * { margin: 0; padding: 0; cursor: none; user-select: none; }
  body { background: #000; overflow: hidden; font-family: 'Arial Black', Arial; }
  #c { display: block; width: 100vw; height: 100vh; }

 .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #fff; font-size: 24px; text-shadow: 0 0 5px #000; pointer-events: none; }

 .hud { position: absolute; bottom: 30px; left: 30px; color: #0f0; font-size: 28px; font-weight: bold; text-shadow: 2px 2px 4px #000; }
 .ammo { position: absolute; bottom: 30px; right: 30px; color: #ff0; font-size: 32px; font-weight: bold; text-shadow: 2px 2px 4px #000; }

 .killfeed { position: absolute; top: 30px; right: 30px; color: #fff; font-size: 16px; text-align: right; text-shadow: 2px 2px 4px #000; }
 .kill { margin: 3px 0; animation: slideIn 0.3s; }
  @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

 .healthbar { position: absolute; bottom: 80px; left: 30px; width: 300px; height: 25px; background: #333; border: 3px solid #0f0; }
 .healthfill { height: 100%; background: linear-gradient(90deg, #f00, #ff0, #0f0); transition: width 0.2s; }

 .damage { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle, transparent 40%, rgba(255,0,0,0.5) 100%); pointer-events: none; opacity: 0; transition: opacity 0.2s; }

 .start { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #fff; text-align: center; background: rgba(0,0,0,0.9); padding: 40px; border: 4px solid #0f0; }
 .start h1 { font-size: 50px; color: #0f0; margin-bottom: 20px; }
 .start p { font-size: 18px; margin: 10px 0; }

 .end { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #0f0; font-size: 80px; font-weight: bold; text-shadow: 0 0 30px #0f0; display: none; }
</style>
</head>
<body>
<div class="crosshair">+</div>
<div class="hud">HP: <span id="hp">100</span> | KILLS: <span id="kills">0</span>/8</div>
<div class="healthbar"><div class="healthfill" id="healthfill" style="width:100%"></div></div>
<div class="ammo"><span id="weapon">AK-47</span><br><span id="ammo">30</span>/90</div>
<div class="killfeed" id="killfeed"></div>
<div class="damage" id="damage"></div>
<div class="end" id="end">VICTORY!</div>

<div class="start" id="start">
  <h1>SA SOLDIER</h1>
  <p>Click to Start | WASD Move | Mouse Aim</p>
  <p>Left Click: Shoot | R: Reload | Shift: Sprint | C: Crouch | 1/2: Switch Gun</p>
  <p>Eliminate all 8 enemies</p>
  <p style="font-size:14px; color:#0f0">Built by Meta AI + You</p>
</div>

<canvas id="c"></canvas>

<script type="importmap">
{"imports": {"three": "https://unpkg.com/three@0.160.0/build/three.module.js"}}
</script>

<script type="module">
import * as THREE from 'three';

// AUDIO SYSTEM
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, duration, type='square') {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 50, 300);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);

scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(50, 100, 50);
scene.add(sun);

// GROUND
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(500, 500),
  new THREE.MeshStandardMaterial({ color: 0x3a5f3a, roughness: 0.8 })
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// BUILDINGS + COVER
let buildings = [];
for(let i=0; i<15; i++) {
  const w = 8 + Math.random()*12;
  const h = 10 + Math.random()*25;
  const d = 8 + Math.random()*12;
  const b = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, d),
    new THREE.MeshStandardMaterial({ color: 0x555, roughness: 0.9 })
  );
  b.position.set((Math.random()-0.5)*200, h/2, (Math.random()-0.5)*200);
  scene.add(b);
  buildings.push(b);
}

// PLAYER
let player = {
  pos: new THREE.Vector3(0, 2, 0),
  rot: { x: 0, y: 0 },
  vel: new THREE.Vector3(),
  speed: 0.15,
  sprint: 0.25,
  crouch: 0.08,
  health: 100,
  kills: 0,
  weapon: 'ak',
  ammo: 30,
  maxAmmo: 90,
  reloading: false,
  alive: true
};

// WEAPONS
const weapons = {
  ak: { damage: 25, fireRate: 100, mag: 30, spread: 0.02, name: 'AK-47' },
  pistol: { damage: 40, fireRate: 300, mag: 12, spread: 0.01, name: 'Pistol' }
};
let lastShot = 0;

// ENEMIES
let enemies = [];
function spawnEnemy() {
  const e = new THREE.Mesh(
    new THREE.BoxGeometry(1.5, 3, 1.5),
    new THREE.MeshStandardMaterial({ color: 0x8B0000 })
  );
  e.position.set((Math.random()-0.5)*150, 1.5, (Math.random()-0.5)*150);
  e.userData = { health: 100, lastShot: 0, target: null };
  scene.add(e);
  enemies.push(e);
}
for(let i=0; i<8; i++) spawnEnemy();

// CONTROLS
let keys = {};
document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

// MOUSE LOOK
document.addEventListener('click', () => {
  if(!started) startGame();
  document.body.requestPointerLock();
});
document.addEventListener('mousemove', e => {
  if(document.pointerLockElement === document.body) {
    player.rot.y -= e.movementX * 0.002;
    player.rot.x -= e.movementY * 0.002;
    player.rot.x = Math.max(-1.5, Math.min(1.5, player.rot.x));
  }
});

// GAME STATE
let started = false;
let bullets = [];

function startGame() {
  started = true;
  document.getElementById('start').style.display = 'none';
  audioCtx.resume();
}

// SHOOTING
function shoot() {
  const now = Date.now();
  const w = weapons[player.weapon];
  if(now - lastShot < w.fireRate || player.reloading || player.ammo <= 0 ||!player.alive) return;

  lastShot = now;
  player.ammo--;
  playSound(200, 0.1, 'square');

  // Recoil
  player.rot.x += (Math.random()-0.5) * w.spread;

  // Raycast
  const ray = new THREE.Raycaster(
    player.pos,
    new THREE.Vector3(0,0,-1).applyEuler(new THREE.Euler(player.rot.x, player.rot.y, 0))
  );

  const hits = ray.intersectObjects(enemies);
  if(hits.length > 0) {
    const enemy = hits[0].object;
    enemy.userData.health -= w.damage;

    // Damage number
    addKill(`${w.name} HIT!`);

    if(enemy.userData.health <= 0) {
      scene.remove(enemy);
      enemies = enemies.filter(e => e!== enemy);
      player.kills++;
      addKill(`YOU KILLED ENEMY! ${player.kills}/8`);
      playSound(600, 0.2, 'sine');
      spawnEnemy(); // Respawn

      if(player.kills >= 8) {
        document.getElementById('end').style.display = 'block';
        player.alive = false;
      }
    }
  }

  updateHUD();
}

document.addEventListener('mousedown', e => {
  if(e.button === 0) shoot();
});

// RELOAD
function reload() {
  if(player.reloading || player.ammo === weapons[player.weapon].mag || player.maxAmmo <= 0) return;
  player.reloading = true;
  playSound(150, 1.5, 'sawtooth');
  setTimeout(() => {
    const need = weapons[player.weapon].mag - player.ammo;
    const take = Math.min(need, player.maxAmmo);
    player.ammo += take;
    player.maxAmmo -= take;
    player.reloading = false;
    updateHUD();
  }, 1500);
}

// ENEMY AI
function updateEnemies() {
  enemies.forEach(e => {
    // Move towards player
    const dir = player.pos.clone().sub(e.position).normalize();
    e.position.add(dir.multiplyScalar(0.05));

    // Look at player
    e.lookAt(player.pos);

    // Shoot player
    const now = Date.now();
    if(now - e.userData.lastShot > 1000 && e.position.distanceTo(player.pos) < 40) {
      e.userData.lastShot = now;
      if(Math.random() > 0.7) damagePlayer(10);
    }

    // Collision with buildings
    buildings.forEach(b => {
      if(e.position.distanceTo(b.position) < 8) {
        e.position.add(dir.multiplyScalar(-0.1));
      }
    });
  });
}

// DAMAGE PLAYER
function damagePlayer(dmg) {
  if(!player.alive) return;
  player.health -= dmg;
  document.getElementById('damage').style.opacity = '0.8';
  setTimeout(() => document.getElementById('damage').style.opacity = '0', 200);
  playSound(100, 0.3, 'sawtooth');

  if(player.health <= 0) {
    player.alive = false;
    document.getElementById('end').textContent = 'GAME OVER';
    document.getElementById('end').style.display = 'block';
  }
  updateHUD();
}

// KILLFEED
function addKill(text) {
  const div = document.createElement('div');
  div.className = 'kill';
  div.textContent = text;
  document.getElementById('killfeed').prepend(div);
  setTimeout(() => div.remove(), 3000);
}

// HUD
function updateHUD() {
  document.getElementById('hp').textContent = Math.max(0, player.health);
  document.getElementById('healthfill').style.width = player.health + '%';
  document.getElementById('kills').textContent = player.kills;
  document.getElementById('ammo').textContent = player.ammo;
  document.getElementById('weapon').textContent = weapons[player.weapon].name;
}

// GAME LOOP
function animate() {
  requestAnimationFrame(animate);

  if(!started ||!player.alive) {
    renderer.render(scene, camera);
    return;
  }

  // MOVEMENT
  let moveSpeed = keys['shift']? player.sprint : keys['c']? player.crouch : player.speed;
  let forward = new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0), player.rot.y);
  let right = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), player.rot.y);

  if(keys['w']) player.pos.add(forward.multiplyScalar(moveSpeed));
  if(keys['s']) player.pos.add(forward.multiplyScalar(-moveSpeed));
  if(keys['a']) player.pos.add(right.multiplyScalar(-moveSpeed));
  if(keys['d']) player.pos.add(right.multiplyScalar(moveSpeed));

  if(keys['r']) reload();
  if(keys['1']) { player.weapon = 'ak'; updateHUD(); }
  if(keys['2']) { player.weapon = 'pistol'; updateHUD(); }

  // CAMERA
  camera.position.copy(player.pos);
  camera.rotation.order = 'YXZ';
  camera.rotation.x = player.rot.x;
  camera.rotation.y = player.rot.y;

  // Crouch height
  camera.position.y = keys['c']? 1 : 2;

  updateEnemies();
  updateHUD();

  renderer.render(scene, camera);
}
animate();

// Auto fire when holding mouse
setInterval(() => {
  if(started && player.alive) shoot();
}, 50);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
