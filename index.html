<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mini NFS Mobile Fixed</title>
<style>
    * { touch-action: manipulation; user-select: none; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; background: #0a0a0a; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial; overflow: hidden; }
  canvas { border: 3px solid #00b4d8; border-radius: 16px; box-shadow: 0 0 30px rgba(0,180,216,0.6); max-width: 100vw; max-height: 65vh; display: block; }

.hud { position: absolute; top: 8px; left: 8px; color: #0ff; background: rgba(0,0,0,0.85); padding: 8px 12px; border-radius: 8px; border: 2px solid #00b4d8; font-size: 12px; font-weight: bold; }
.track-select { position: absolute; top: 8px; right: 8px; color: #ff0; background: rgba(0,0,0,0.85); padding: 6px 10px; border-radius: 8px; border: 2px solid #ff0; font-size: 11px; font-weight: bold; }

  /* BIGGER MOBILE CONTROLS */
.controls { position: absolute; bottom: 0; width: 100%; height: 35vh; pointer-events: none; }
.btn { position: absolute; width: 85px; height: 85px; background: rgba(0,180,216,0.25); border: 4px solid #00b4d8; border-radius: 50%; color: white; font-size: 32px; font-weight: bold; display: flex; align-items: center; justify-content: center; pointer-events: all; backdrop-filter: blur(8px); box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
.btn:active { background: rgba(0,180,216,0.6); transform: scale(0.92); }

  #btn-up { bottom: 140px; left: 50%; transform: translateX(-50%); }
  #btn-down { bottom: 35px; left: 50%; transform: translateX(-50%); }
  #btn-left { bottom: 87px; left: 25px; }
  #btn-right { bottom: 87px; right: 25px; }
  #btn-reset { top: 120px; right: 15px; width: 60px; height: 60px; font-size: 18px; border-color: #ff0; background: rgba(255,255,0,0.25); }

  @media (orientation: landscape) {
    canvas { max-height: 80vh; }
  .controls { height: 25vh; }
    #btn-up { bottom: 100px; }
    #btn-down { bottom: 20px; }
    #btn-left { bottom: 60px; left: 50px; }
    #btn-right { bottom: 60px; right: 50px; }
    #btn-reset { top: 80px; }
  }
</style>
</head>
<body>
<div class="hud">
  <div>SPEED: <span id="speed">0</span> km/h</div>
  <div>LAP: <span id="lap">0/3</span></div>
  <div>TIME: <span id="time">0.00</span>s</div>
  <div>POS: <span id="pos">1/3</span></div>
</div>
<div class="track-select">TRACK: <span id="trackNum">1</span></div>

<canvas id="game"></canvas>

<div class="controls">
  <div class="btn" id="btn-up">↑</div>
  <div class="btn" id="btn-down">↓</div>
  <div class="btn" id="btn-left">←</div>
  <div class="btn" id="btn-right">→</div>
  <div class="btn" id="btn-reset">R</div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let currentTrack = 0;
let tireMarks = [];
let driftParticles = [];
let keys = {};
let startTime = Date.now();
let checkpoint = { x:0, y:0, passed:false };

// Resize canvas for phone
function resizeCanvas() {
  canvas.width = Math.min(window.innerWidth * 0.95, 900);
  canvas.height = window.innerHeight * 0.65;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Tracks - positions calculated each frame now
function getTrack(trackId) {
  let w = canvas.width, h = canvas.height;
  if (trackId === 0) return { inner:{x:60,y:50,w:w-120,h:h-100}, start:{x:w/2,y:h-70} };
  if (trackId === 1) return { inner:{x:80,y:40,w:w-160,h:h-80}, start:{x:w/2,y:h-60} };
  return { inner:{x:50,y:40,w:w-100,h:h-80}, start:{x:w/2,y:h-60} };
}

let player = { x:0, y:0, angle:-Math.PI/2, speed:0, maxSpeed:9, accel:0.25, friction:0.96, color:'#ff0040', lap:0, checkpoint:false };
let ai1 = { x:0, y:0, angle:-Math.PI/2, speed:6, maxSpeed:8, accel:0.2, friction:0.96, color:'#00aaff', lap:0, checkpoint:false };
let ai2 = { x:0, y:0, angle:-Math.PI/2, speed:6, maxSpeed:7.8, accel:0.19, friction:0.96, color:'#ffaa00', lap:0, checkpoint:false };
let cars = [player, ai1, ai2];

// MOBILE BUTTONS
function setKey(key, val) {
  keys[key] = val;
  if (val &&!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

['btn-up','btn-down','btn-left','btn-right'].forEach(id => {
  let key = { 'btn-up':'w', 'btn-down':'s', 'btn-left':'a', 'btn-right':'d' }[id];
  let btn = document.getElementById(id);
  btn.addEventListener('touchstart', e => { e.preventDefault(); setKey(key,true); });
  btn.addEventListener('touchend', e => { e.preventDefault(); setKey(key,false); });
  btn.addEventListener('mousedown', () => setKey(key,true));
  btn.addEventListener('mouseup', () => setKey(key,false));
});
document.getElementById('btn-reset').addEventListener('click', () => reset());

// Keyboard + track switch
document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key >= '1' && e.key <= '3') {
    currentTrack = parseInt(e.key) - 1;
    reset();
    document.getElementById('trackNum').textContent = e.key;
  }
});
document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

let audioCtx;
function playEngine(speed) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.frequency.value = 80 + speed * 15;
  gain.gain.value = 0.015 + speed * 0.002;
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.08);
}

function updateCar(car, isPlayer) {
  let t = getTrack(currentTrack);
  if (isPlayer) {
    if (keys['w']) car.speed += car.accel;
    if (keys['s']) car.speed -= car.accel * 1.6;
    if (keys['a']) car.angle -= 0.06 * (Math.abs(car.speed) / car.maxSpeed);
    if (keys['d']) car.angle += 0.06 * (Math.abs(car.speed) / car.maxSpeed);
    if (Math.abs(car.speed) > 6) playEngine(Math.abs(car.speed));
  } else {
    let targetX = canvas.width/2 + Math.sin(Date.now()/2000 + car.lap) * (canvas.width/3);
    let targetAngle = Math.atan2(canvas.height/3 - car.y, targetX - car.x);
    car.angle += (targetAngle - car.angle) * 0.05;
    car.speed = car.maxSpeed * 0.9;
  }

  let drifting = Math.abs(car.speed) > 5 && (keys['a'] || keys['d']);
  if (drifting && isPlayer) {
    for(let i=0; i<2; i++) {
      driftParticles.push({x: car.x - Math.cos(car.angle)*12, y: car.y - Math.sin(car.angle)*12, life:20});
      tireMarks.push({x: car.x - Math.cos(car.angle)*12, y: car.y - Math.sin(car.angle)*12, life:100});
    }
  }

  car.speed *= car.friction;
  car.speed = Math.max(-car.maxSpeed/2, Math.min(car.speed, car.maxSpeed));
  car.x += Math.cos(car.angle) * car.speed;
  car.y += Math.sin(car.angle) * car.speed;

  if (car.x < t.inner.x || car.x > t.inner.x + t.inner.w || car.y < t.inner.y || car.y > t.inner.y + t.inner.h) {
    car.speed *= 0.6;
  }

  let dist = Math.hypot(car.x - checkpoint.x, car.y - checkpoint.y);
  if (dist < 35 &&!car.checkpoint) {
    car.checkpoint = true;
    car.lap++;
    if (car.lap > 3 && isPlayer) reset();
  }
  if (dist > 60) car.checkpoint = false;
}

function drawCar(car) {
  ctx.save();
  ctx.translate(car.x, car.y);
  ctx.rotate(car.angle);

  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.ellipse(2, 3, 16, 9, 0, 0, Math.PI*2);

  ctx.fillStyle = car.color;
  ctx.beginPath();
  ctx.roundRect(-14, -8, 28, 16, 5);
  ctx.fill();

  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.roundRect(-9, -4, 18, 8, 3);
  ctx.fill();

  ctx.fillStyle = '#ffff88';
  ctx.fillRect(10, -5, 3, 2);
  ctx.fillRect(10, 3, 3, 2);
  ctx.restore();
}

function draw() {
  let t = getTrack(currentTrack);
  checkpoint = { x:canvas.width/2, y:t.inner.y + 20, passed:false };

  ctx.fillStyle = '#0a2a0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#555';
  ctx.fillRect(t.inner.x-40, t.inner.y-40, t.inner.w+80, t.inner.h+80);
  ctx.fillStyle = '#222';
  ctx.fillRect(t.inner.x, t.inner.y, t.inner.w, t.inner.h);

  ctx.strokeStyle = 'rgba(50,50,50,0.5)';
  ctx.lineWidth = 3;
  tireMarks = tireMarks.filter(m => m.life-- > 0);
  tireMarks.forEach(m => {
    ctx.beginPath();
    ctx.moveTo(m.x, m.y);
    ctx.lineTo(m.x + Math.random()*4-2, m.y + Math.random()*4-2);
    ctx.stroke();
  });

  ctx.strokeStyle = 'white';
  ctx.lineWidth = 4;
  ctx.setLineDash([20, 20]);
  ctx.strokeRect(t.inner.x-40, t.inner.y-40, t.inner.w+80, t.inner.h+80);
  ctx.setLineDash([]);

  ctx.fillStyle = '#ff0';
  ctx.fillRect(checkpoint.x - 30, checkpoint.y - 5, 60, 10);

  driftParticles = driftParticles.filter(p => p.life-- > 0);
  driftParticles.forEach(p => {
    ctx.fillStyle = `rgba(200,200,200,${p.life/20})`;
    ctx.beginPath();
    ctx.arc(p.x + Math.random()*8-4, p.y + Math.random()*8-4, 6, 0, Math.PI*2);
    ctx.fill();
  });

  cars.forEach(c => drawCar(c));
}

function update() {
  if (keys['r']) reset();
  cars.forEach((c, i) => updateCar(c, i===0));

  let sorted = [...cars].sort((a,b) => b.lap - a.lap || b.y - a.y);
  let pos = sorted.indexOf(player) + 1;

  document.getElementById('speed').textContent = Math.floor(Math.abs(player.speed * 22));
  document.getElementById('lap').textContent = Math.min(player.lap, 3) + '/3';
  document.getElementById('time').textContent = ((Date.now() - startTime) / 1000).toFixed(2);
  document.getElementById('pos').textContent = pos + '/3';
}

function reset() {
  let t = getTrack(currentTrack);
  player.x = t.start.x; player.y = t.start.y; player.angle = -Math.PI/2; player.speed = 0; player.lap = 0; player.checkpoint = false;
  ai1.x = t.start.x-30; ai1.y = t.start.y; ai1.angle = -Math.PI/2; ai1.lap = 0; ai1.checkpoint = false;
  ai2.x = t.start.x+30; ai2.y = t.start.y; ai2.angle = -Math.PI/2; ai2.lap = 0; ai2.checkpoint = false;
  startTime = Date.now(); tireMarks = []; driftParticles = [];
}

reset(); // spawn cars correctly first time

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
