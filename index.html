<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VIP GUARDIAN v3.5.3 - Fast AI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; }
body { background: #000; color: #0ff; overflow: hidden; }
.header { background: linear-gradient(90deg, #001122, #004488); padding: 10px; text-align: center; border-bottom: 3px solid #0ff; }
.btn { background: #0ff; color: #000; border: none; padding: 8px 12px; margin: 5px 2px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 12px; }
.btn:disabled { background: #444; color: #888; }
.video-container { position: relative; display: inline-block; }
video, canvas { border: 2px solid #0ff; border-radius: 6px; }
canvas { position: absolute; top: 0; left: 0; }
.loading { color: #ffaa00; font-size: 12px; }
.scan-status { color: #0f0; font-size: 11px; margin-top: 5px; }
.similarity { font-size: 11px; color: #ffaa00; }
input, select { width: 100%; padding: 6px; margin: 5px 0; background: #222; border: 2px solid #0ff; color: #0ff; border-radius: 4px; }
/* rest of your CSS same */
</style>
</head>
<body>

<div class="header"><h1>🛡️ VIP GUARDIAN v3.5.3 FAST</h1></div>

<div class="screen active" id="guests">
  <h3>Real Face Recognition AI</h3>
  <div class="loading" id="modelStatus">Checking cache...</div>
  
  <div class="video-container">
    <video id="video" width="200" height="200" autoplay muted></video>
    <canvas id="overlay" width="200" height="200"></canvas>
    <canvas id="canvas" style="display:none;"></canvas>
  </div>
  
  <div class="scan-status" id="scanStatus">Initializing...</div>
  <div class="similarity" id="similarityScore"></div>
  
  <input id="guestName" placeholder="Full Name">
  <select id="guestRole"><option value="vip">Red - VIP</option><option value="staff">Blue - Staff</option></select>
  
  <button class="btn" onclick="capturePhoto()">📸 1. Enroll Face</button>
  <button class="btn" onclick="addGuest()" id="addBtn" disabled>2. Add to Database</button>
  <button class="btn" onclick="startFaceScan()" id="scanBtn" disabled>🔍 Start AI Scan</button>
  <div id="guestList"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script>
const RESET_PASSWORD = 'ADMIN123';
let guests = JSON.parse(localStorage.getItem('vip_guests_v35') || '[]');
let currentDescriptor = null;
let faceScanInterval = null;
let faceScanTimeout = null;
let modelsLoaded = false;
const FACE_MATCH_THRESHOLD = 0.6;

// FAST + CACHED MODEL LOADER
async function loadModels() {
  const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@0.22.2/weights';
  const CACHE_KEY = 'faceapi_v1';

  document.getElementById('modelStatus').textContent = 'Checking cache...';

  try {
    // Try load from IndexedDB cache first
    const cached = await faceapi.tf.io.listModels();
    if(cached[`indexeddb://${CACHE_KEY}`]) {
      document.getElementById('modelStatus').textContent = 'Loading from cache... 2sec';
      await faceapi.nets.tinyFaceDetector.load(`indexeddb://${CACHE_KEY}/tinyFaceDetector`);
      await faceapi.nets.faceRecognitionNet.load(`indexeddb://${CACHE_KEY}/faceRecognitionNet`);
    } else {
      // First time: download from CDN
      document.getElementById('modelStatus').textContent = 'Downloading AI models... 12-15sec on 4G';
      
      await Promise.all([
        faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
        faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
      ]);

      // Save to cache for next time
      document.getElementById('modelStatus').textContent = 'Caching for offline use...';
      await faceapi.tf.io.copyModel(
        `${MODEL_URL}/tiny_face_detector_model-shard1`,
        `indexeddb://${CACHE_KEY}/tinyFaceDetector`
      );
      await faceapi.tf.io.copyModel(
        `${MODEL_URL}/face_recognition_model-shard1`,
        `indexeddb://${CACHE_KEY}/faceRecognitionNet`
      );
    }

    modelsLoaded = true;
    document.getElementById('modelStatus').textContent = '✅ AI Ready - Fast Mode';
    document.getElementById('scanBtn').disabled = false;
    document.getElementById('scanStatus').textContent = 'Ready to scan';
  } catch(e) {
    console.error(e);
    document.getElementById('modelStatus').textContent = '❌ Failed. Using Basic Mode';
    document.getElementById('scanStatus').textContent = 'No AI - Hand detection only';
    // You can add fallback pixel detection here
  }
}

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({video: {width: 200, height: 200}});
  document.getElementById('video').srcObject = stream;
}

async function capturePhoto() {
  if(!modelsLoaded) return alert('AI still loading...');
  
  const video = document.getElementById('video');
  const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
    .withFaceDescriptor();
  
  if(!detection) return alert('No face detected! Move back + good light.');
  
  currentDescriptor = Array.from(detection.descriptor);
  document.getElementById('addBtn').disabled = false;
  alert(`✅ Face captured! Now click "Add to Database"`);
}

function addGuest() {
  const name = document.getElementById('guestName').value.trim();
  if(!name) return alert('Enter name first');
  if(!currentDescriptor) return alert('Enroll face first');

  const id = 'VIP' + Date.now().toString().slice(-6);
  const canvas = document.getElementById('canvas');
  canvas.width = 200; canvas.height = 200;
  canvas.getContext('2d').drawImage(document.getElementById('video'), 0, 0, 200, 200);
  const photo = canvas.toDataURL('image/png');

  guests.push({name, id, photo, descriptor: currentDescriptor});
  localStorage.setItem('vip_guests_v35', JSON.stringify(guests));

  currentDescriptor = null;
  document.getElementById('addBtn').disabled = true;
  document.getElementById('guestName').value = '';
  document.getElementById('scanStatus').textContent = '✅ Guest added!';
  renderGuests();
}

async function startFaceScan() {
  if(!modelsLoaded) return alert('AI loading...');
  if(guests.length === 0) return alert('No guests enrolled!');

  document.getElementById('scanStatus').textContent = 'AI Scanning... 5sec timeout';
  const video = document.getElementById('video');
  const ctx = document.getElementById('overlay').getContext('2d');
  let matchFound = false;

  faceScanInterval = setInterval(async () => {
    const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
      .withFaceDescriptor();
    
    ctx.clearRect(0, 0, 200, 200);
    if(detection) {
      const box = detection.detection.box;
      ctx.strokeStyle = '#0f0';
      ctx.lineWidth = 3;
      ctx.strokeRect(box.x, box.y, box.width, box.height);

      let bestMatch = null;
      let bestDistance = 999;

      for(let g of guests) {
        const distance = faceapi.euclideanDistance(
          detection.descriptor,
          new Float32Array(g.descriptor)
        );
        if(distance < bestDistance) {
          bestDistance = distance;
          bestMatch = g;
        }
      }

      const matchPercent = Math.max(0, 100 - (bestDistance * 100)).toFixed(0);
      document.getElementById('similarityScore').textContent = 
        bestMatch? `${bestMatch.name} - ${matchPercent}%` : 'No match';

      if(bestDistance < FACE_MATCH_THRESHOLD && bestMatch &&!matchFound) {
        matchFound = true;
        clearInterval(faceScanInterval);
        clearTimeout(faceScanTimeout);
        document.getElementById('scanStatus').textContent = 
          `✅ MATCH: ${bestMatch.name} - ${matchPercent}% ACCESS GRANTED`;
        navigator.vibrate(200);
        setTimeout(() => stopFaceScan(), 3000);
      }
    }
  }, 500);

  faceScanTimeout = setTimeout(() => {
    if(!matchFound) {
      clearInterval(faceScanInterval);
      document.getElementById('scanStatus').textContent = '❌ NO MATCH - DENIED';
      alert('⚠️ UNKNOWN FACE DETECTED');
      navigator.vibrate([100,100,100]);
      setTimeout(() => stopFaceScan(), 3000);
    }
  }, 5000);
}

function stopFaceScan() {
  clearInterval(faceScanInterval);
  clearTimeout(faceScanTimeout);
  document.getElementById('overlay').getContext('2d').clearRect(0, 0, 200, 200);
  document.getElementById('scanStatus').textContent = 'Scan stopped';
}

function renderGuests() {
  document.getElementById('guestList').innerHTML = guests.map(g => 
    `<div style="padding:5px; margin:3px; background:#1a1a1a; border-left:3px solid #0ff;">
      <strong>${g.name}</strong> - AI Face
    </div>`
  ).join('');
}

window.onload = async () => { 
  await loadModels();
  await startCamera();
}
</script>
</body>
</html>
