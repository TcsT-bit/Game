<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini NFS</title>
<style>
  body { margin: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial; }
  canvas { border: 3px solid #00b4d8; border-radius: 12px; box-shadow: 0 0 30px rgba(0,180,216,0.4); }
  .hud { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; }
  .controls { position: absolute; bottom: 20px; color: #aaa; font-size: 14px; }
</style>
</head>
<body>
<div class="hud">
  <div>Speed: <span id="speed">0</span> km/h</div>
  <div>Lap: <span id="lap">0/3</span></div>
  <div>Time: <span id="time">0.00</span>s</div>
</div>
<div class="controls">W/↑ = Gas | S/↓ = Brake | A/← D/→ = Steer | R = Reset</div>
<canvas id="game" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let car = { x: 400, y: 500, angle: -Math.PI/2, speed: 0, maxSpeed: 8, accel: 0.2, friction: 0.95 };
let keys = {};
let lap = 0;
let startTime = Date.now();
let checkpoint = { x: 400, y: 100, passed: false };

document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

function update() {
  // Controls
  if (keys['w'] || keys['arrowup']) car.speed += car.accel;
  if (keys['s'] || keys['arrowdown']) car.speed -= car.accel * 1.5;
  if (keys['a'] || keys['arrowleft']) car.angle -= 0.05 * (car.speed / car.maxSpeed);
  if (keys['d'] || keys['arrowright']) car.angle += 0.05 * (car.speed / car.maxSpeed);
  if (keys['r']) reset();

  car.speed *= car.friction;
  car.speed = Math.max(-car.maxSpeed/2, Math.min(car.speed, car.maxSpeed));
  
  car.x += Math.cos(car.angle) * car.speed;
  car.y += Math.sin(car.angle) * car.speed;

  // Track borders
  if (car.x < 50 || car.x > 750 || car.y < 50 || car.y > 550) {
    car.speed *= 0.5; // slow down on grass
  }

  // Checkpoint + Lap
  let dist = Math.hypot(car.x - checkpoint.x, car.y - checkpoint.y);
  if (dist < 30 && !checkpoint.passed) {
    checkpoint.passed = true;
    lap++;
    if (lap > 3) reset();
  }
  if (dist > 50) checkpoint.passed = false;

  // HUD
  document.getElementById('speed').textContent = Math.floor(Math.abs(car.speed * 20));
  document.getElementById('lap').textContent = Math.min(lap, 3) + '/3';
  document.getElementById('time').textContent = ((Date.now() - startTime) / 1000).toFixed(2);
}

function draw() {
  // Track
  ctx.fillStyle = '#2d5016';
  ctx.fillRect(0, 0, 800, 600);
  ctx.fillStyle = '#444';
  ctx.fillRect(50, 50, 700, 500);
  
  // Track lines
  ctx.strokeStyle = 'white';
  ctx.lineWidth = 3;
  ctx.setLineDash([20, 20]);
  ctx.strokeRect(50, 50, 700, 500);
  ctx.setLineDash([]);
  
  // Checkpoint
  ctx.fillStyle = checkpoint.passed ? '#00ff00' : '#ff0';
  ctx.fillRect(checkpoint.x - 30, checkpoint.y - 5, 60, 10);

  // Car
  ctx.save();
  ctx.translate(car.x, car.y);
  ctx.rotate(car.angle);
  ctx.fillStyle = '#ff3b3b';
  ctx.fillRect(-15, -8, 30, 16);
  ctx.fillStyle = '#1b4965';
  ctx.fillRect(-10, -5, 20, 10);
  ctx.restore();
}

function reset() {
  car.x = 400; car.y = 500; car.angle = -Math.PI/2; car.speed = 0;
  lap = 0; startTime = Date.now(); checkpoint.passed = false;
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
  </html>
