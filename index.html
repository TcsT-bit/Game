<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pretoria Street Racer</title>
<style>
    * { margin: 0; padding: 0; touch-action: none; }
  body { background: #000; overflow: hidden; font-family: Arial; }
  #c { display: block; width: 100vw; height: 100vh; }
.hud { position: absolute; top: 20px; left: 20px; color: #0ff; background: rgba(0,0,0,0.8); padding: 12px 18px; border-radius: 10px; border: 2px solid #00b4d8; font-size: 16px; font-weight: bold; }
.city-tag { position: absolute; top: 20px; right: 20px; color: #ff0; background: rgba(0,0,0,0.8); padding: 10px 15px; border-radius: 10px; border: 2px solid #ff0; font-size: 14px; font-weight: bold; }
.controls { position: absolute; bottom: 30px; width: 100%; height: 180px; pointer-events: none; }
.btn { position: absolute; width: 80px; height: 80px; background: rgba(0,180,216,0.4); border: 3px solid #00b4d8; border-radius: 50%; color: white; font-size: 30px; display: flex; align-items: center; justify-content: center; pointer-events: all; }
.btn:active { background: rgba(0,180,216,0.8); transform: scale(0.9); }
  #up { bottom: 90px; left: 50%; margin-left: -40px; }
  #down { bottom: 0; left: 50%; margin-left: -40px; }
  #left { bottom: 45px; left: 40px; }
  #right { bottom: 45px; right: 40px; }
  #nitro { bottom: 90px; right: 40px; width: 70px; height: 70px; font-size: 14px; border-color: #ff0; }
</style>
</head>
<body>
<div class="hud">
  <div>SPEED: <span id="speed">0</span> km/h</div>
  <div>TIME: <span id="time">0.0</span>s</div>
</div>
<div class="city-tag">CITY: PRETORIA CBD</div>
<canvas id="c"></canvas>
<div class="controls">
  <div class="btn" id="up">↑</div>
  <div class="btn" id="down">↓</div>
  <div class="btn" id="left">←</div>
  <div class="btn" id="right">→</div>
  <div class="btn" id="nitro">NITRO</div>
</div>

<script type="importmap">
{"imports": {"three": "https://unpkg.com/three@0.160.0/build/three.module.js"}}
</script>

<script type="module">
import * as THREE from 'three';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB); // Day sky
scene.fog = new THREE.Fog(0x87CEEB, 80, 400);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 1.3));
const sun = new THREE.DirectionalLight(0xffffff, 1.5);
sun.position.set(50, 100, 50);
scene.add(sun);

// Load your car texture
const loader = new THREE.TextureLoader();
const carTexture = loader.load(
  'https://files.catbox.moe/6p72yd.jpg',
  () => console.log('Car loaded'),
  undefined,
  () => console.log('Car texture failed, using color')
);

// ROAD - Pretoria style 4-lane
const road = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 3000),
  new THREE.MeshLambertMaterial({ color: 0x333 })
);
road.rotation.x = -Math.PI / 2;
road.position.z = -1500;
scene.add(road);

// Road lines
let lines = [];
for (let i = -1500; i < 1500; i += 25) {
  const line = new THREE.Mesh(
    new THREE.BoxGeometry(0.8, 0.1, 12),
    new THREE.MeshBasicMaterial({ color: 0xfff })
  );
  line.position.set(0, 0.1, i);
  scene.add(line);
  lines.push(line);
}

// PRETORIA CBD BUILDINGS - Grid layout like real city
// Church St runs N-S, Paul Kruger St E-W
const pretoriaBuildings = [
  // Church St buildings - tall office blocks
  {x: -45, z: -1200, w: 18, h: 80, d: 18, color: 0x2a3a4a},
  {x: -45, z: -1100, w: 16, h: 65, d: 16, color: 0x333},
  {x: 45, z: -1150, w: 20, h: 90, d: 20, color: 0x2b2b3b}, // Reserve Bank
  {x: 45, z: -1050, w: 15, h: 55, d: 15, color: 0x3a3a4a},

  // Paul Kruger St
  {x: -40, z: -1000, w: 17, h: 70, d: 17, color: 0x2c2c3c},
  {x: 40, z: -1000, w: 17, h: 70, d: 17, color: 0x2c2c3c},

  // More blocks - generate grid
];
for (let i = 0; i < 80; i++) {
  let x = (i % 2 === 0? -1 : 1) * (40 + Math.random() * 20);
  let z = Math.floor(i/2) * 35 - 1400;
  let h = 25 + Math.random() * 80;
  let w = 12 + Math.random() * 8;

  const building = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, w),
    new THREE.MeshLambertMaterial({ color: pretoriaBuildings[i%4]?.color || 0x1a2a3a })
  );
  building.position.set(x, h/2, z);
  scene.add(building);

  // Windows
  for (let y = 5; y < h; y += 7) {
    if (Math.random() > 0.5) {
      const window = new THREE.Mesh(
        new THREE.PlaneGeometry(2, 2.5),
        new THREE.MeshBasicMaterial({ color: 0xffff88 })
      );
      window.position.set(x + (x>0? w/2+0.1 : -w/2-0.1), y, z);
      window.rotation.y = x>0? 0 : Math.PI;
      scene.add(window);
    }
  }
}

// YOUR CAR with texture
const car = new THREE.Group();

// Car body with your image
const bodyMat = new THREE.MeshLambertMaterial({
  map: carTexture,
  color: 0xffffff // fallback if texture fails
});
const body = new THREE.Mesh(
  new THREE.BoxGeometry(3.5, 1.2, 7),
  bodyMat
);
body.position.y = 0.8;
car.add(body);

// Roof
const roof = new THREE.Mesh(
  new THREE.BoxGeometry(3, 0.8, 3.5),
  new THREE.MeshLambertMaterial({ color: 0xcc0022 })
);
roof.position.y = 1.8;
roof.position.z = -0.5;
car.add(roof);

// Wheels
for (let x of [-1.8, 1.8]) {
  for (let z of [-2.5, 2.5]) {
    const wheel = new THREE.Mesh(
      new THREE.CylinderGeometry(0.8, 0.8, 0.6, 12),
      new THREE.MeshLambertMaterial({ color: 0x111 })
    );
    wheel.rotation.z = Math.PI / 2;
    wheel.position.set(x, 0.4, z);
    car.add(wheel);
  }
}
car.position.set(0, 0, 0);
scene.add(car);

// Camera - chase view
camera.position.set(0, 7, 18);
camera.lookAt(0, 1, -8);

let speed = 0, turn = 0, keys = {};
let startTime = Date.now();

// Controls
['up','down','left','right'].forEach(id => {
  let key = {up:'w', down:'s', left:'a', right:'d'}[id];
  document.getElementById(id).addEventListener('touchstart', e => { e.preventDefault(); keys[key]=true; });
  document.getElementById(id).addEventListener('touchend', e => { e.preventDefault(); keys[key]=false; });
});
document.getElementById('nitro').addEventListener('touchstart', () => keys['n']=true);
document.getElementById('nitro').addEventListener('touchend', () => keys['n']=false);

function animate() {
  requestAnimationFrame(animate);

  if (keys['w']) speed += 0.022;
  if (keys['s']) speed -= 0.035;
  if (keys['a']) turn = Math.min(turn + 0.045, 0.7);
  if (keys['d']) turn = Math.max(turn - 0.045, -0.7);
  if (keys['n'] && speed > 0.2) speed += 0.04;
  turn *= 0.9;

  speed *= 0.982;
  speed = Math.max(0, Math.min(speed, keys['n']? 1.2 : 0.85));

  car.rotation.y = turn;
  car.position.z -= speed * 9;
  car.position.x = turn * 15;

  // Move lines
  lines.forEach(line => {
    line.position.z += speed * 9;
    if (line.position.z > 1500) line.position.z -= 3000;
  });

  camera.position.x = car.position.x * 0.6;
  camera.position.z = car.position.z + 18;
  camera.lookAt(car.position.x, 1.5, car.position.z - 10);

  if (car.position.z < -1500) car.position.z = 1500;

  document.getElementById('speed').textContent = Math.floor(speed * 340);
  document.getElementById('time').textContent = ((Date.now() - startTime) / 1000).toFixed(1);

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
   </html>
