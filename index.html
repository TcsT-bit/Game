<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Street Racer 3D</title>
<style>
    * { touch-action: manipulation; user-select: none; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Arial Black', Arial; }
  canvas { border: 3px solid #00b4d8; border-radius: 12px; box-shadow: 0 0 30px rgba(0,180,216,0.7); max-width: 100vw; max-height: 75vh; }

 .hud { position: absolute; top: 15px; left: 15px; color: #0ff; background: rgba(0,0,0,0.8); padding: 12px 18px; border-radius: 10px; border: 2px solid #00b4d8; font-size: 16px; text-shadow: 0 0 8px #0ff; font-weight: bold; }
 .hud div { margin: 3px 0; }

  /* Mobile controls */
 .controls { position: absolute; bottom: 0; width: 100%; height: 30vh; pointer-events: none; }
 .btn { position: absolute; width: 90px; height: 90px; background: rgba(0,180,216,0.3); border: 4px solid #00b4d8; border-radius: 50%; color: white; font-size: 36px; font-weight: bold; display: flex; align-items: center; justify-content: center; pointer-events: all; backdrop-filter: blur(6px); box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
 .btn:active { background: rgba(0,180,216,0.7); transform: scale(0.9); }
  #btn-up { bottom: 130px; left: 50%; transform: translateX(-50%); }
  #btn-down { bottom: 25px; left: 50%; transform: translateX(-50%); }
  #btn-left { bottom: 77px; left: 30px; }
  #btn-right { bottom: 77px; right: 30px; }
  #btn-boost { top: 130px; right: 20px; width: 70px; height: 70px; font-size: 16px; border-color: #ff0; background: rgba(255,255,0,0.3); }

  @media (orientation: landscape) {
    canvas { max-height: 85vh; }
   .controls { height: 22vh; }
    #btn-up { bottom: 95px; }
    #btn-down { bottom: 15px; }
    #btn-left { bottom: 55px; left: 60px; }
    #btn-right { bottom: 55px; right: 60px; }
  }
</style>
</head>
<body>
<div class="hud">
  <div>SPEED: <span id="speed">0</span> km/h</div>
  <div>TIME: <span id="time">0.00</span>s</div>
  <div>DISTANCE: <span id="dist">0</span>m</div>
</div>

<canvas id="game"></canvas>

<div class="controls">
  <div class="btn" id="btn-up">↑</div>
  <div class="btn" id="btn-down">↓</div>
  <div class="btn" id="btn-left">←</div>
  <div class="btn" id="btn-right">→</div>
  <div class="btn" id="btn-boost">NITRO</div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Responsive canvas
function resize() {
  canvas.width = Math.min(window.innerWidth * 0.95, 900);
  canvas.height = window.innerHeight * 0.75;
}
resize();
window.addEventListener('resize', resize);

// Game state
let playerX = 0; // -1 to 1, left to right
let playerSpeed = 0;
let maxSpeed = 12;
let accel = 0.3;
let friction = 0.98;
let distance = 0;
let startTime = Date.now();
let nitro = 100;
let boost = false;

// Road segments for 3D effect
let segments = [];
let segLength = 200;
let rumbleLength = 3;
let trackLength = 500;

// Generate road with curves + hills
for (let i = 0; i < trackLength; i++) {
  let angle = Math.sin(i / 30) * 0.5; // curves
  let y = Math.sin(i / 50) * 100; // hills
  segments.push({ curve: angle, y: y });
}

// Mobile + keyboard controls
let keys = {};
function setKey(key, val) { keys[key] = val; }

['btn-up','btn-down','btn-left','btn-right'].forEach(id => {
  let key = { 'btn-up':'w', 'btn-down':'s', 'btn-left':'a', 'btn-right':'d' }[id];
  let btn = document.getElementById(id);
  btn.addEventListener('touchstart', e => { e.preventDefault(); setKey(key,true); });
  btn.addEventListener('touchend', e => { e.preventDefault(); setKey(key,false); });
  btn.addEventListener('mousedown', () => setKey(key,true));
  btn.addEventListener('mouseup', () => setKey(key,false));
});
document.getElementById('btn-boost').addEventListener('touchstart', () => boost = true);
document.getElementById('btn-boost').addEventListener('touchend', () => boost = false);

document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

// Projection math for 3D
function project(p, camX, camY, camZ) {
  let scale = camZ / (p.z - camZ);
  p.X = (1 + scale * (p.x - camX)) * canvas.width / 2;
  p.Y = (1 - scale * (p.y - camY)) * canvas.height / 2;
  p.scale = scale;
}

function drawRoad() {
  let camZ = playerSpeed * 20;
  let camY = 1500;
  let baseSegment = Math.floor(distance / segLength) % segments.length;

  // Sky gradient
  let skyGrad = ctx.createLinearGradient(0,0,0,canvas.height*0.5);
  skyGrad.addColorStop(0, '#87CEEB');
  skyGrad.addColorStop(1, '#1e3c72');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0,0,canvas.width,canvas.height*0.5);

  // Buildings in background
  ctx.fillStyle = '#2a2a2a';
  for(let i=0; i<20; i++) {
    let x = (i * 200 - distance*0.1) % (canvas.width + 200) - 100;
    let h = 100 + Math.sin(i) * 50;
    ctx.fillRect(x, canvas.height*0.5 - h, 80, h);
    // Windows
    ctx.fillStyle = '#ff0';
    for(let j=0; j<h/20; j++) {
      ctx.fillRect(x+10, canvas.height*0.5 - h + j*20 + 5, 10, 10);
      ctx.fillRect(x+60, canvas.height*0.5 - h + j*20 + 5, 10, 10);
    }
    ctx.fillStyle = '#2a2a2a';
  }

  let maxy = canvas.height;
  let n, seg, p1, p2;

  for (n = baseSegment; n < baseSegment + 300; n++) {
    seg = segments[n % segments.length];

    p1 = { x: -seg.curve - playerX * 0.5, y: seg.y - camY, z: (n - baseSegment) * segLength - camZ };
    p2 = { x: seg.curve - playerX * 0.5, y: seg.y - camY, z: (n - baseSegment + 1) * segLength - camZ };

    project(p1, 0, camY, camZ);
    project(p2, 0, camY, camZ);

    if (p1.Y >= maxy) continue;

    let color = Math.floor(n / rumbleLength) % 2? '#555' : '#777';
    let rumbleColor = Math.floor(n / rumbleLength) % 2? '#b00' : '#d00';

    // Road
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(p1.X - p1.scale * 400, p1.Y);
    ctx.lineTo(p2.X - p2.scale * 400, p2.Y);
    ctx.lineTo(p2.X + p2.scale * 400, p2.Y);
    ctx.lineTo(p1.X + p1.scale * 400, p1.Y);
    ctx.closePath();
    ctx.fill();

    // Rumble strips
    ctx.fillStyle = rumbleColor;
    ctx.beginPath();
    ctx.moveTo(p1.X - p1.scale * 420, p1.Y);
    ctx.lineTo(p1.X - p1.scale * 400, p1.Y);
    ctx.lineTo(p2.X - p2.scale * 400, p2.Y);
    ctx.lineTo(p2.X - p2.scale * 420, p2.Y);
    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(p1.X + p1.scale * 400, p1.Y);
    ctx.lineTo(p1.X + p1.scale * 420, p1.Y);
    ctx.lineTo(p2.X + p2.scale * 420, p2.Y);
    ctx.lineTo(p2.X + p2.scale * 400, p2.Y);
    ctx.closePath();
    ctx.fill();

    // Lane lines
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 3 * p1.scale;
    ctx.setLineDash([50, 50]);
    ctx.beginPath();
    ctx.moveTo(p1.X, p1.Y);
    ctx.lineTo(p2.X, p2.Y);
    ctx.stroke();
    ctx.setLineDash([]);

    maxy = p2.Y;
  }
}

function drawCar() {
  let carY = canvas.height * 0.85;
  let carX = canvas.width / 2 + playerX * canvas.width * 0.3;
  let scale = 1.2;

  ctx.save();
  ctx.translate(carX, carY);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.ellipse(0, 25, 40*scale, 15*scale, 0, 0, Math.PI*2);
  ctx.fill();

  // Car body - sporty shape
  let grad = ctx.createLinearGradient(-30*scale,-20*scale, 30*scale,20*scale);
  grad.addColorStop(0, '#ff0033');
  grad.addColorStop(0.5, '#ff6688');
  grad.addColorStop(1, '#990022');
  ctx.fillStyle = grad;

  ctx.beginPath();
  ctx.moveTo(-30*scale, -10*scale);
  ctx.quadraticCurveTo(0, -25*scale, 30*scale, -10*scale);
  ctx.lineTo(30*scale, 15*scale);
  ctx.quadraticCurveTo(0, 25*scale, -30*scale, 15*scale);
  ctx.closePath();
  ctx.fill();

  // Windshield
  ctx.fillStyle = '#4a90e2';
  ctx.beginPath();
  ctx.moveTo(-20*scale, -8*scale);
  ctx.quadraticCurveTo(0, -18*scale, 20*scale, -8*scale);
  ctx.lineTo(20*scale, 5*scale);
  ctx.lineTo(-20*scale, 5*scale);
  ctx.closePath();
  ctx.fill();

  // Headlights
  ctx.fillStyle = 'rgba(255,255,200,0.9)';
  ctx.beginPath();
  ctx.arc(25*scale, -5*scale, 6*scale, 0, Math.PI*2);
  ctx.arc(25*scale, 5*scale, 6*scale, 0, Math.PI*2);
  ctx.fill();

  // Speed lines when boosting
  if (boost && playerSpeed > 8) {
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 2;
    for(let i=0; i<10; i++) {
      let y = -20 + i*5;
      ctx.beginPath();
      ctx.moveTo(-40*scale, y);
      ctx.lineTo(-60*scale - playerSpeed*2, y + Math.random()*4-2);
      ctx.stroke();
    }
  }

  ctx.restore();
}

function update() {
  // Controls
  if (keys['w']) playerSpeed += accel;
  if (keys['s']) playerSpeed -= accel * 1.5;
  if (keys['a']) playerX -= 0.05;
  if (keys['d']) playerX += 0.05;

  // Nitro boost
  if (boost && nitro > 0 && playerSpeed > 3) {
    playerSpeed += 0.5;
    nitro -= 0.5;
  } else {
    nitro = Math.min(100, nitro + 0.2);
  }

  playerSpeed *= friction;
  playerSpeed = Math.max(0, Math.min(playerSpeed, maxSpeed + (boost?3:0)));
  playerX = Math.max(-1, Math.min(1, playerX));

  distance += playerSpeed;

  // HUD
  document.getElementById('speed').textContent = Math.floor(playerSpeed * 25);
  document.getElementById('time').textContent = ((Date.now() - startTime) / 1000).toFixed(1);
  document.getElementById('dist').textContent = Math.floor(distance / 10);
}

function gameLoop() {
  update();
  drawRoad();
  drawCar();
  requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
