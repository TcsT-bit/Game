<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NFS 3D</title>
<style>
    * { margin: 0; padding: 0; touch-action: none; user-select: none; }
  body { background: #000; overflow: hidden; font-family: 'Arial Black', Arial; }
  #c { display: block; width: 100vw; height: 100vh; }

.hud { position: absolute; top: 20px; left: 20px; color: #0ff; background: rgba(0,0,0,0.7); padding: 15px 20px; border-radius: 12px; border: 2px solid #00b4d8; font-size: 18px; text-shadow: 0 0 10px #0ff; pointer-events: none; }
.hud div { margin: 5px 0; }

  /* Mobile controls */
.controls { position: absolute; bottom: 30px; width: 100%; height: 200px; pointer-events: none; }
.btn { position: absolute; width: 90px; height: 90px; background: rgba(0,180,216,0.3); border: 4px solid #00b4d8; border-radius: 50%; color: white; font-size: 36px; font-weight: bold; display: flex; align-items: center; justify-content: center; pointer-events: all; backdrop-filter: blur(8px); }
.btn:active { background: rgba(0,180,216,0.8); transform: scale(0.9); }
  #up { bottom: 100px; left: 50%; margin-left: -45px; }
  #down { bottom: 0; left: 50%; margin-left: -45px; }
  #left { bottom: 50px; left: 30px; }
  #right { bottom: 50px; right: 30px; }
  #nitro { bottom: 100px; right: 30px; width: 80px; height: 80px; font-size: 16px; border-color: #ff0; background: rgba(255,255,0,0.3); }

  @media (orientation: landscape) {
  .controls { height: 150px; bottom: 20px; }
    #up { bottom: 70px; }
    #down { bottom: 0; }
    #left { bottom: 35px; left: 60px; }
    #right { bottom: 35px; right: 60px; }
    #nitro { bottom: 70px; right: 60px; }
  }
</style>
</head>
<body>
<div class="hud">
  <div>SPEED: <span id="speed">0</span> km/h</div>
  <div>TIME: <span id="time">0.00</span>s</div>
  <div>NITRO: <span id="nitroBar">100%</span></div>
</div>

<canvas id="c"></canvas>

<div class="controls">
  <div class="btn" id="up">↑</div>
  <div class="btn" id="down">↓</div>
  <div class="btn" id="left">←</div>
  <div class="btn" id="right">→</div>
  <div class="btn" id="nitro">NITRO</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// Scene setup
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.002);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

// Lights
const ambient = new THREE.AmbientLight(0x404040, 1.5);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(50, 100, 50);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 1024;
dirLight.shadow.mapSize.height = 1024;
scene.add(dirLight);

// Road
const roadGeo = new THREE.PlaneGeometry(4000, 20);
const roadMat = new THREE.MeshLambertMaterial({ color: 0x333 });
const road = new THREE.Mesh(roadGeo, roadMat);
road.rotation.x = -Math.PI / 2;
road.receiveShadow = true;
scene.add(road);

// Lane lines
for (let i = -2000; i < 2000; i += 40) {
  const line = new THREE.Mesh(
    new THREE.BoxGeometry(2, 0.1, 20),
    new THREE.MeshBasicMaterial({ color: 0xffffff })
  );
  line.position.set(0, 0.1, i);
  scene.add(line);
}

// Buildings
for (let i = 0; i < 100; i++) {
  const w = 20 + Math.random() * 30;
  const h = 50 + Math.random() * 150;
  const d = 20 + Math.random() * 30;
  const building = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, d),
    new THREE.MeshLambertMaterial({ color: 0x222 })
  );
  building.position.set(
    (Math.random() > 0.5? 1 : -1) * (15 + Math.random() * 50),
    h/2,
    i * 40 - 2000
  );
  building.castShadow = true;
  building.receiveShadow = true;
  scene.add(building);

  // Windows
  for (let y = 5; y < h; y += 10) {
    for (let x = -w/2 + 2; x < w/2; x += 6) {
      const window = new THREE.Mesh(
        new THREE.PlaneGeometry(3, 4),
        new THREE.MeshBasicMaterial({ color: Math.random() > 0.3? 0xffff00 : 0x111 })
      );
      window.position.set(building.position.x + (x > 0? w/2 + 0.1 : -w/2 - 0.1), y, building.position.z);
      window.rotation.y = x > 0? 0 : Math.PI;
      scene.add(window);
    }
  }
}

// Player car - more detailed
const carGroup = new THREE.Group();

// Body
const body = new THREE.Mesh(
  new THREE.BoxGeometry(4, 1.5, 8),
  new THREE.MeshPhongMaterial({ color: 0xff0033, shininess: 100 })
);
body.position.y = 1;
body.castShadow = true;
carGroup.add(body);

// Roof
const roof = new THREE.Mesh(
  new THREE.BoxGeometry(3.5, 1, 4),
  new THREE.MeshPhongMaterial({ color: 0xff0033 })
);
roof.position.y = 2.25;
roof.position.z = -1;
carGroup.add(roof);

// Windshield
const glass = new THREE.Mesh(
  new THREE.BoxGeometry(3.3, 0.8, 3.8),
  new THREE.MeshPhongMaterial({ color: 0x4a90e2, transparent: true, opacity: 0.7 })
);
glass.position.y = 2.2;
glass.position.z = -1;
carGroup.add(glass);

// Wheels
for (let x of [-2, 2]) {
  for (let z of [-3, 3]) {
    const wheel = new THREE.Mesh(
      new THREE.CylinderGeometry(1, 1, 1, 16),
      new THREE.MeshPhongMaterial({ color: 0x111 })
    );
    wheel.rotation.z = Math.PI / 2;
    wheel.position.set(x, 0.5, z);
    wheel.castShadow = true;
    carGroup.add(wheel);
  }
}

// Headlights
const headlight = new THREE.Mesh(
  new THREE.SphereGeometry(0.5, 16, 16),
  new THREE.MeshBasicMaterial({ color: 0xffffaa })
);
headlight.position.set(2, 1, -3.5);
carGroup.add(headlight);
const headlight2 = headlight.clone();
headlight2.position.x = -2;
carGroup.add(headlight2);

carGroup.position.set(0, 0, 0);
scene.add(carGroup);

// Game state
let speed = 0, maxSpeed = 0.8, accel = 0.015, friction = 0.98;
let turn = 0, nitro = 100, boost = false;
let keys = {};
let distance = 0;
let startTime = Date.now();

camera.position.set(0, 10, 20);
camera.lookAt(carGroup.position);

// Controls
['up','down','left','right'].forEach(id => {
  let key = {up:'w', down:'s', left:'a', right:'d'}[id];
  let btn = document.getElementById(id);
  btn.addEventListener('touchstart', e => { e.preventDefault(); keys[key]=true; });
  btn.addEventListener('touchend', e => { e.preventDefault(); keys[key]=false; });
});
document.getElementById('nitro').addEventListener('touchstart', () => boost = true);
document.getElementById('nitro').addEventListener('touchend', () => boost = false);

document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

// Game loop
function animate() {
  requestAnimationFrame(animate);

  // Input
  if (keys['w']) speed += accel;
  if (keys['s']) speed -= accel * 1.5;
  if (keys['a']) turn = Math.min(turn + 0.03, 0.5);
  if (keys['d']) turn = Math.max(turn - 0.03, -0.5);
  turn *= 0.9; // auto-center steering

  // Nitro
  if (boost && nitro > 0 && speed > 0.3) {
    speed += 0.025;
    nitro -= 0.4;
  } else {
    nitro = Math.min(100, nitro + 0.15);
  }

  speed *= friction;
  speed = Math.max(0, Math.min(speed, maxSpeed + (boost? 0.3 : 0)));

  // Move car + road
  carGroup.rotation.y = turn;
  carGroup.position.z -= speed * 10;
  distance += speed;

  // Camera follow
  camera.position.x = carGroup.position.x + turn * 5;
  camera.position.z = carGroup.position.z + 20;
  camera.lookAt(carGroup.position.x, 2, carGroup.position.z - 10);

  // Loop road
  if (carGroup.position.z < -2000) {
    carGroup.position.z = 2000;
  }

  // HUD
  document.getElementById('speed').textContent = Math.floor(speed * 350);
  document.getElementById('time').textContent = ((Date.now() - startTime) / 1000).toFixed(1);
  document.getElementById('nitroBar').textContent = Math.floor(nitro) + '%';

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
