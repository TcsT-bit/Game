<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VIP GUARDIAN v3.5.1 - Fixed</title>
<style>
/* Same CSS as yours, no changes needed */
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; }
body { background: #000; color: #0ff; overflow: hidden; }
body.light { background: #f0f0f0; color: #003; }
.header { background: linear-gradient(90deg, #001122, #004488); padding: 10px; text-align: center; border-bottom: 3px solid #0ff; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 18px; text-shadow: 0 0 10px #0ff; }
.ai-score { background: #0f0; color: #000; padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
.tabs { display: flex; background: #111; border-bottom: 2px solid #0ff; }
.tab { flex: 1; padding: 8px; text-align: center; cursor: pointer; background: #1a1a1a; border-right: 1px solid #333; font-size: 10px; }
.tab.active { background: #0ff; color: #000; }
.screen { display: none; padding: 10px; height: calc(100vh - 105px); overflow-y: auto; }
.screen.active { display: block; }
.btn { background: #0ff; color: #000; border: none; padding: 8px 12px; margin: 5px 2px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 12px; }
.btn:disabled { background: #444; color: #888; cursor: not-allowed; }
.btn-danger { background: #ff0044; color: #fff; font-size: 14px; padding: 12px; width: 100%; }
.btn-gps { background: #00ff88; }
.btn-whatsapp { background: #25D366; color: #fff; }
.btn-reset { background: #8B0000; color: #fff; border: 2px solid #ff0044; }
input, select { width: 100%; padding: 6px; margin: 5px 0; background: #222; border: 2px solid #0ff; color: #0ff; border-radius: 4px; font-size: 12px; }
.video-container { position: relative; display: inline-block; }
video, canvas { border: 2px solid #0ff; border-radius: 6px; }
canvas { position: absolute; top: 0; left: 0; }
.scan-status { color: #0f0; font-size: 11px; margin-top: 5px; }
.similarity { font-size: 11px; color: #ffaa00; margin-top: 3px; }
.loading { color: #ffaa00; font-size: 12px; }
.guest-card { background: #1a1a1a; border-left: 4px solid #0ff; padding: 6px; margin: 5px 0; border-radius: 4px; font-size: 11px; display: flex; align-items: center; gap: 8px; }
.qr-box { width: 200px; height: 200px; background: #fff; margin: 8px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #000; font-size: 8px; text-align: center; padding: 5px; border: 3px solid #0ff; }
.qr-photo { width: 70px; height: 70px; border-radius: 50%; overflow: hidden; border: 2px solid #0ff; }
.qr-photo img { width: 100%; height: 100%; object-fit: cover; }
.reset-section { background: #220000; border: 2px solid #ff0044; padding: 10px; margin-top: 15px; border-radius: 8px; }
.reset-warning { color: #ff6666; font-size: 10px; margin: 5px 0; }
.log-entry { background: #222; padding: 5px; margin: 2px 0; border-radius: 3px; font-size: 10px; }
.alert { background: #ff0044; color: #fff; padding: 10px; margin: 8px 0; border-radius: 8px; display: none; text-align: center; font-size: 14px; animation: blink 0.4s infinite; }
@keyframes blink { 50% { opacity: 0.6; } }
</style>
</head>
<body>

<div class="header">
  <h1>🛡️ VIP GUARDIAN v3.5.1</h1>
  <div class="ai-score" id="aiScore">AI Risk: 0</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showScreen('rings')">RINGS+GPS+BAT</div>
  <div class="tab" onclick="showScreen('guests')">FACE AI PRO</div>
  <div class="tab" onclick="showScreen('plate')">PLATE OCR</div>
  <div class="tab" onclick="showScreen('threat')">AI THREAT+PDF</div>
  <div class="tab" onclick="showScreen('evac')">WHATSAPP+LOG</div>
</div>

<!-- FACE AI PRO -->
<div class="screen active" id="guests">
  <h3>Real Face Recognition AI</h3>
  <div class="loading" id="modelStatus">Loading AI models... 5sec</div>
  
  <div class="video-container">
    <video id="video" width="200" height="200" autoplay muted></video>
    <canvas id="overlay" width="200" height="200"></canvas>
    <canvas id="canvas" style="display:none;"></canvas> <!-- HIDDEN PHOTO CANVAS -->
  </div>
  
  <div class="scan-status" id="scanStatus">Waiting for models...</div>
  <div class="similarity" id="similarityScore"></div>
  
  <input id="guestName" placeholder="Full Name">
  <select id="guestRole">
    <option value="vip">Red - VIP</option>
    <option value="staff">Blue - Staff</option>
  </select>
  
  <button class="btn" onclick="capturePhoto()">📸 1. Enroll Face + Descriptor</button>
  <button class="btn" onclick="addGuest()" id="addBtn" disabled>2. Add to Database</button>
  <button class="btn" onclick="startFaceScan()" id="scanBtn" disabled>🔍 Start AI Scan</button>

  <div id="guestList"></div>

  <div id="qrModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:100;">
    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:#111; padding:12px; border:3px solid #0ff;">
      <h3>VIP Access Card</h3>
      <div class="qr-box" id="qrCode"></div>
      <button class="btn" onclick="closeQR()">Close</button>
    </div>
  </div>
</div>

<!-- Other screens: rings, plate, threat, evac - same as your code -->
<div class="screen" id="rings">...</div>
<div class="screen" id="plate">...</div>
<div class="screen" id="threat">...</div>
<div class="screen" id="evac">...</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script>
const RESET_PASSWORD = 'ADMIN123';
let guests = JSON.parse(localStorage.getItem('vip_guests_v35') || '[]');
let guards = JSON.parse(localStorage.getItem('vip_guards_v3') || '[]');
let logs = JSON.parse(localStorage.getItem('vip_logs_v3') || '[]');
let currentDescriptor = null;
let faceScanInterval = null;
let faceScanTimeout = null;
let modelsLoaded = false;
const FACE_MATCH_THRESHOLD = 0.6;

// FIXED addGuest with proper checks
function addGuest() {
  const name = document.getElementById('guestName').value.trim();
  const role = document.getElementById('guestRole').value;
  
  if(!name) return alert('❌ Step 1: Enter Full Name first');
  if(!currentDescriptor) return alert('❌ Step 2: Click "Enroll Face + Descriptor" and look at camera until popup shows');

  const id = 'VIP' + Date.now().toString().slice(-6);
  const canvas = document.getElementById('canvas');
  canvas.width = 200; canvas.height = 200;
  canvas.getContext('2d').drawImage(document.getElementById('video'), 0, 0, 200, 200);
  const photo = canvas.toDataURL('image/png');

  guests.push({name, role, id, photo, descriptor: currentDescriptor});
  localStorage.setItem('vip_guests_v35', JSON.stringify(guests));

  document.getElementById('qrCode').innerHTML = `
    <div class="qr-photo"><img src="${photo}"></div>
    <div>${name}<br>${id}<br>${role.toUpperCase()}</div>
  `;
  document.getElementById('qrModal').style.display = 'block';

  // Reset for next guest
  document.getElementById('guestName').value = '';
  currentDescriptor = null;
  document.getElementById('addBtn').disabled = true;
  document.getElementById('scanStatus').textContent = '✅ Guest added! Enroll next face.';
  renderGuests();
  calculateAI();
}

async function capturePhoto() {
  if(!modelsLoaded) return alert('AI models still loading...');
  
  const video = document.getElementById('video');
  const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
    .withFaceLandmarks().withFaceDescriptor();
  
  if(!detection) return alert('❌ No face detected! Move back so whole face is visible + good lighting.');
  
  currentDescriptor = Array.from(detection.descriptor);
  document.getElementById('addBtn').disabled = false;
  alert(`✅ Face captured! 128-point descriptor saved.\nNow click "Add to Database"`);
}

// Rest of your functions stay the same: loadModels, startCamera, startFaceScan, stopFaceScan, renderGuests, etc.
// Just make sure scanBtn enables after models load:
async function loadModels() {
  const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
  await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
  await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
  await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
  modelsLoaded = true;
  document.getElementById('modelStatus').textContent = '✅ AI Models Loaded - Ready';
  document.getElementById('scanBtn').disabled = false;
  document.getElementById('scanStatus').textContent = 'Ready to scan';
}

// ... paste all your other functions here unchanged ...
window.onload = async () => { 
  updateChecklist(); 
  renderGuests(); 
  renderGuards(); 
  renderLogs(); 
  calculateAI(); 
  await loadModels();
  startCamera();
}
</script>
</body>
</html>
